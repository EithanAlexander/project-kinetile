# Unit/integration tests for Java, dashboard, and ingestion.
# Aggregate job `ci-success` is the status check to require on main.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: java
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: mvn test -B

  dashboard:
    name: dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

  ingestion:
    name: ingestion
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run pytest
        run: poetry run pytest

  ci-success:
    name: ci-success
    needs: [java, dashboard, ingestion]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Require all jobs to succeed
        env:
          JAVA_RESULT: ${{ needs.java.result }}
          DASHBOARD_RESULT: ${{ needs.dashboard.result }}
          INGESTION_RESULT: ${{ needs.ingestion.result }}
        run: |
          failed=0
          for pair in "java:${JAVA_RESULT}" "dashboard:${DASHBOARD_RESULT}" "ingestion:${INGESTION_RESULT}"; do
            name="${pair%%:*}"
            result="${pair##*:}"
            echo "${name}: ${result}"
            if [ "${result}" != "success" ]; then
              echo "::error::CI job '${name}' did not succeed (result=${result})"
              failed=1
            fi
          done
          if [ "${failed}" -ne 0 ]; then
            exit 1
          fi
          echo "All CI jobs passed."
