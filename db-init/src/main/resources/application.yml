spring:
  application:
    name: db-init
  main:
    web-application-type: none
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_HOST_PORT:15432}/${POSTGRES_DB:projectkinetile}
    username: ${POSTGRES_USER:projectkinetile}
    password: ${POSTGRES_PASSWORD:projectkinetile}
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  bootstrap:
    force: ${DB_INIT_FORCE:false}
    registry-resource: classpath:data/infrastructure-registry.json
