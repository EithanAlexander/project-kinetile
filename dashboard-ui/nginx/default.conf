# Shared rate-limit state: key requests by client IP ($binary_remote_addr).
# zone=api_limit:10m allocates 10 MB for IP→counter maps; rate=10r/s is the sustained cap.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Built React app (Vite output) copied into the dashboard-ui image at build time.
    root /usr/share/nginx/html;
    include /etc/nginx/mime.types;
    # Fallback when a file extension is not listed in mime.types.
    default_type application/octet-stream;

    # Browser hardening for the static shell and proxied API responses.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 'unsafe-inline' on script/style allows Vite's injected module tags and Tailwind runtime;
    # connect-src 'self' keeps fetch/WebSocket targets same-origin (via /api/v1/ below).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'" always;

    # Reject oversized bodies before they reach the Java backend.
    client_max_body_size 1m;

    # Public API only — do not expose /api/internal/* to browsers.
    # Same-origin /api/v1/* → Spring Boot in Docker Compose (service name physics-engine).
    location /api/v1/ {
        # burst=20 allows short spikes; nodelay serves burst immediately instead of queuing.
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://physics-engine:8080;
        proxy_http_version 1.1;
        # Preserve Host and client IP so Spring sees the browser, not the nginx container.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA routing: unknown paths fall back to index.html so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
